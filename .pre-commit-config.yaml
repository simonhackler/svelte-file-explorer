repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Format with Prettier
        files: \.(js|ts|jsx|tsx|svelte|json|css|scss|md|yaml|yml)$
        args: [--write]

  - repo: local
    hooks:
      - id: bun-check
        name: Svelte Type Check
        entry: bun run check
        language: system
        files: \.(js|ts|jsx|tsx|svelte)$
        pass_filenames: false

      - id: bun-lint
        name: ESLint
        entry: bun run lint
        language: system
        files: \.(js|ts|jsx|tsx|svelte)$
        pass_filenames: false
